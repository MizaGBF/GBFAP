<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Demo v10</title>
	<script src="js/animation.js"></script>
	<script src="js/load_player.js"></script>
	<script src="js/util.js"></script>
	<script src="js/vendors/require.js"></script>
	<link rel="stylesheet" href="css/player.css">
	<script>
function init()
{
	let animations = [new Animation("Demo", {
		cjs:"demo", // animation to play
		specials:["esp_demo_01"], // charge attacks
		attack:"phit_demo", // attack effect
		"demo_motions":["setin", "wait", "attack", "dead"], // animation playlist under the Demo action
		is_enemy:true
	})];
	// the demo doesn't use config.json, we pass it through the function
	load_player(animations, {
		use_game_config:"local",
		game: {
			local: {
				corsProxy: null,
				xjsUri: ".",
				jsUri: ".",
				imgUri: "./img",
				soundUri: "https://prd-game-a-granbluefantasy.akamaized.net/assets_en/sound",
				extern: "https://prd-game-a-granbluefantasy.akamaized.net/assets_en",
				bgUri: ".",
				testUri: null
			}
		},
		buttons:{ // button text
			reset:"Reset",
			pause:"Pause",
			frame:"Frame",
			loop:"Loop",
			sound:"Mute",
			beep:"Beep",
			playlist:"Playlist",
			ability_target:"Skill",
			bound_box:"Box",
			enemy_position:"Enemy",
			download:"Download",
			record:"Record",
			texture:"Texture",
			delete:"Delete",
			upload:"Upload"
		},
		disable_bounding_boxes:false,
		default_background:"./assets/backgrounds/raid/grid.jpg",
		backgrounds: {
			"Upload":"upload",
			"Last":"last",
			"Grid":"./assets/backgrounds/raid/grid.jpg",
			"Black":"./assets/backgrounds/raid/black.jpg"
		},
		audio_disabled: true
	});
}
	</script>
</head>
<body onload="init()">
	<div id="debug-panel" style="display:none"></div>
	<!-- player-container is where the player will be initialized, it MUST be empty -->
	<div id="player-container"></div>
	<br>
	Minimal example to embed the player in a HTML page.<br>
	Check the content of HTML and the readme file for details.<br>
</body>
</html>
